<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>타로 시그널 (Tarot Signal)</title>

<!-- Open Graph / 카카오톡 공유 미리보기 -->
<meta property="og:type"        content="website"/>
<meta property="og:title"       content="타로 시그널 (Tarot Signal)"/>
<meta property="og:description" content="세 장의 카드가 당신의 길을 안내할 거예요."/>
<meta property="og:site_name"   content="타로 시그널"/>
<meta name="description"        content="세 장의 카드가 당신의 길을 안내할 거예요."/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// html2canvas 로드 실패 시 unpkg fallback
window.addEventListener('error', function(e) {
  if(e.target && e.target.src && e.target.src.includes('html2canvas') && typeof html2canvas === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js';
    document.head.appendChild(s);
  }
}, true);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--gold2:rgba(201,169,110,0.18);--gold3:rgba(201,169,110,0.06);
  --bg:#0d0a1a;--bg2:#120d22;--bg3:#1a1130;
  --text:#e8dfc8;--muted:#8a7d6a;--faint:#5a5248;
}
body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;min-height:100vh;overflow-x:hidden}
#app{max-width:900px;margin:0 auto;padding:2.5rem 1.2rem 4rem;overflow-x:hidden}
@media(max-width:480px){
  #app{padding:1.5rem .8rem 3rem}
}

/* Header */
.hdr{text-align:center;margin-bottom:2.5rem}
.hdr-eye{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.25em;color:#5a5248;text-transform:uppercase}
.divider{width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.6rem auto}
.hdr h1{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;color:var(--gold);letter-spacing:.1em;margin-bottom:.3rem}
.hdr p{font-size:.85rem;color:var(--muted);font-style:italic}

/* API / Question */
.panel{background:var(--gold3);border:1px solid rgba(201,169,110,.18);border-radius:10px;padding:1.1rem 1.4rem;margin-bottom:1.4rem}
.lbl{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem}
input[type=password],textarea{
  width:100%;background:rgba(201,169,110,.07);border:1px solid rgba(201,169,110,.25);
  border-radius:6px;color:var(--text);font-family:'Lora',Georgia,serif;font-size:.9rem;
  padding:.55rem .9rem;outline:none;transition:border-color .3s
}
input[type=password]:focus,textarea:focus{border-color:rgba(201,169,110,.55)}
input[type=password]::placeholder,textarea::placeholder{color:var(--faint)}
textarea{resize:vertical;min-height:80px}
.note{font-size:.68rem;color:#5a5248;margin-top:.45rem;font-style:italic}

/* Controls */
.ctrl{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.8rem}
.btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.6rem 1.5rem;border-radius:40px;border:1px solid rgba(201,169,110,.4);
  cursor:pointer;transition:all .3s;background:transparent;color:var(--gold)}
.btn:hover:not(:disabled){background:rgba(201,169,110,.12);border-color:var(--gold);box-shadow:0 0 18px rgba(201,169,110,.15)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:rgba(201,169,110,.15);border-color:var(--gold)}
.btn-p:hover:not(:disabled){background:rgba(201,169,110,.26)}

/* ── DECK SCROLL AREA ── */
.spread-label{
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:.7rem
}
#deck-fan{
  position:relative;
  width:100%;
  height:168px;           /* hover lift(22px) + 카드(118px) + 여유(28px) */
  overflow:hidden;
}
#deck-scroll-wrap{
  position:absolute;
  left:0;right:0;
  bottom:0;               /* 카드를 아래 기준으로 정렬 → hover 시 위로 올라가도 잘 보임 */
  height:100%;
  overflow-x:auto;overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  scrollbar-color:rgba(201,169,110,.35) transparent;
}
#deck-scroll-wrap::-webkit-scrollbar{height:4px}
#deck-scroll-wrap::-webkit-scrollbar-track{background:transparent}
#deck-scroll-wrap::-webkit-scrollbar-thumb{background:rgba(201,169,110,.35);border-radius:2px}
#deck-row{
  display:flex;
  align-items:flex-end;   /* 카드 하단 기준 정렬 */
  min-height:100%;
  padding:28px 20px 8px;  /* 위 여백 = hover lift 공간 */
  width:max-content;
}

/* ── MINI CARD ── */
.mini-card{
  flex-shrink:0;
  width:72px;height:118px;
  border-radius:8px;
  cursor:grab;
  user-select:none;
  touch-action:pan-x;  /* 가로 스크롤은 허용, 세로만 차단 */
  box-shadow:3px 4px 12px rgba(0,0,0,.55);
  transition:transform .22s cubic-bezier(.2,.8,.3,1), box-shadow .22s, opacity .3s;
  margin-right:-28px;
  position:relative;
}
.mini-card.dragging{
  touch-action:none;  /* 드래그 중엔 모든 스크롤 차단 */
}
.mini-card:last-child{margin-right:0}
.mini-card:hover{
  transform:translateY(-20px) scale(1.08) !important;
  box-shadow:0 14px 32px rgba(0,0,0,.65),0 0 18px rgba(201,169,110,.25) !important;
  z-index:100 !important;
  margin-right:-28px !important;
}
.mini-card.dragging{opacity:.3;cursor:grabbing;transform:scale(.92) !important}
.mini-card.used{opacity:.2;cursor:not-allowed;pointer-events:none;filter:grayscale(.6)}
.mini-card svg{width:100%;height:100%;border-radius:8px;display:block}

.mini-card.hint{ opacity:.35;pointer-events:none; }
.mini-card.hint:nth-child(odd){ transform:translateY(-3px) rotate(-1deg) }
.mini-card.hint:nth-child(even){ transform:translateY(3px) rotate(1deg) }

/* ── DROP ZONES ── */
.slots-area{margin-top:1.6rem}
.slots-row{
  display:flex;
  gap:.7rem;
  justify-content:center;
  flex-wrap:nowrap;       /* 절대 줄바꿈 안 함 */
}
.slot-wrap{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;max-width:140px}
.slot-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:#7a6e5f;text-transform:uppercase;white-space:nowrap}
.drop-slot{
  width:100%;
  aspect-ratio:110/185;   /* 비율 고정 — 너비에 따라 높이 자동 */
  border-radius:10px;
  border:2px dashed rgba(201,169,110,.3);
  background:rgba(201,169,110,.03);
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;position:relative;
}
.drop-slot.drag-over{border-color:var(--gold);background:rgba(201,169,110,.1);box-shadow:0 0 24px rgba(201,169,110,.2)}
.drop-slot.filled{border-style:solid;border-color:rgba(201,169,110,.4)}
.slot-hint{font-family:'Cinzel',serif;font-size:.54rem;color:#4a4238;text-align:center;letter-spacing:.05em;padding:.3rem}
.slot-inner{width:100%;height:100%;border-radius:8px;overflow:hidden;position:relative}
.slot-inner svg{width:100%;height:100%;display:block;border-radius:8px}
.slot-inner.reversed svg{transform:rotate(180deg)}
.rev-badge{
  position:absolute;font-family:'Cinzel',serif;font-size:.42rem;
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(18,13,34,.9);color:#e8a090;border:1px solid rgba(220,130,110,.35);
  padding:2px 6px;border-radius:3px;pointer-events:none;white-space:nowrap;
  bottom:5px;left:50%;transform:translateX(-50%);
}
.slot-inner.reversed .rev-badge{top:5px;bottom:auto;transform:translateX(-50%) rotate(180deg)}
.remove-btn{
  position:absolute;top:6px;right:6px;
  width:26px;height:26px;border-radius:50%;
  background:rgba(13,10,26,.9);
  border:1.5px solid rgba(201,169,110,.55);
  color:var(--gold);font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  line-height:1;
}
.remove-btn:hover{
  background:rgba(201,169,110,.25);
  border-color:var(--gold);
  transform:scale(1.15);
  box-shadow:0 0 10px rgba(201,169,110,.3);
}

/* ── 모바일 ── */
@media(max-width:480px){
  #deck-fan{height:134px}
  #deck-row{padding:22px 12px 6px}
  .mini-card{width:54px;height:89px;margin-right:-20px}
  .mini-card:last-child{margin-right:0}
  .mini-card:hover{transform:translateY(-16px) scale(1.08) !important;margin-right:-20px !important}
  .slots-row{gap:.45rem}
  .slot-label{font-size:.52rem;letter-spacing:.08em}
}

/* ── RESULT MODAL ── */
#result-modal-bg{
  display:none;
  position:fixed;inset:0;z-index:3000;
  background:rgba(0,0,0,.72);
  align-items:center;justify-content:center;
  padding:1rem;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  animation:fadeIn .2s ease;
}
#result-modal-bg.on{ display:flex; }

#result-modal{
  position:relative;
  background:#0d0a1a;
  border:1px solid rgba(201,169,110,.3);
  border-radius:16px;
  width:100%;max-width:560px;
  max-height:90vh;
  overflow-y:auto;
  padding:2.2rem 1.8rem 1.6rem;
  box-shadow:0 24px 60px rgba(0,0,0,.8),0 0 40px rgba(201,169,110,.08);
  animation:slideUp .28s cubic-bezier(.2,.8,.3,1);
  scrollbar-width:thin;
  scrollbar-color:rgba(201,169,110,.3) transparent;
}
#result-modal::-webkit-scrollbar{width:4px}
#result-modal::-webkit-scrollbar-thumb{background:rgba(201,169,110,.3);border-radius:2px}

#result-close-btn{
  position:absolute;
  top:14px;right:14px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(201,169,110,.12);
  border:1px solid rgba(201,169,110,.3);
  color:var(--gold);font-size:.8rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:10;
}
#result-close-btn:hover{background:rgba(201,169,110,.25);border-color:var(--gold)}

#result-box{ margin-bottom:1.2rem; }
.result-title{
  font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);
  letter-spacing:.1em;
  text-align:center;
  width:100%;
  display:block;
  margin-bottom:.5rem;
}
.result-datetime{font-family:'Cinzel',serif;font-size:.62rem;color:#6a5e50;text-align:center;letter-spacing:.08em;margin-bottom:.9rem}
.result-question{font-family:'Lora',Georgia,serif;font-size:.82rem;font-style:italic;color:#8a7d6a;text-align:center;margin-bottom:1.2rem;padding-bottom:.9rem;border-bottom:1px solid rgba(201,169,110,.12)}
.result-question:empty{display:none}
.result-cards-row{display:flex;gap:1rem;justify-content:center;margin-bottom:1.2rem}
.result-card-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;max-width:120px}
.result-card-item .rc-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.12em;color:#7a6e5f;text-transform:uppercase}
.rc-svg-wrap{position:relative;width:100%}
.rc-svg-wrap .rc-svg{width:100%;aspect-ratio:72/118;border-radius:7px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.rc-svg-wrap .rc-svg svg{width:100%;height:100%;display:block}
.rc-svg-wrap.reversed .rc-svg svg{transform:rotate(180deg)}
.rc-rev-badge{
  position:absolute;
  bottom:5px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(18,13,34,.9);color:#e8a090;
  border:1px solid rgba(220,130,110,.4);
  padding:2px 7px;border-radius:3px;white-space:nowrap;pointer-events:none;
}
.rc-svg-wrap.reversed .rc-rev-badge{
  top:5px;bottom:auto;
  transform:translateX(-50%) rotate(180deg);
}
.pills{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.2rem}
.pill{font-size:.66rem;font-family:'Cinzel',serif;color:var(--gold);border:1px solid rgba(201,169,110,.3);border-radius:20px;padding:.22rem .8rem;letter-spacing:.04em}
.result-text{font-size:.95rem;line-height:1.9;color:#d4c8b0;white-space:pre-wrap}
.loading{text-align:center;padding:2rem;color:var(--muted);font-style:italic;font-size:.9rem}
.save-wrap{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
.btn-reset{border-color:rgba(201,169,110,.3);color:var(--muted)}
.btn-reset:hover:not(:disabled){background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.5);color:var(--gold)}
@media(max-width:480px){
  #result-modal{padding:1.5rem 1.1rem 1.3rem}
  .result-cards-row{gap:.6rem}
}

/* ── API Key 우측 상단 버튼 ── */
#api-btn{
  position:fixed;top:16px;right:16px;z-index:1000;
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.45rem 1rem;border-radius:30px;
  border:1px solid rgba(201,169,110,.4);
  background:rgba(13,10,26,.88);color:var(--gold);
  cursor:pointer;display:flex;align-items:center;gap:.4rem;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .25s;
}
#api-btn:hover{background:rgba(201,169,110,.14);border-color:var(--gold);box-shadow:0 0 16px rgba(201,169,110,.18)}
#api-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4a4238;flex-shrink:0;
  transition:background .3s;
}
#api-dot.active{background:#52b788;box-shadow:0 0 6px rgba(82,183,136,.7)}

/* ── 모달 배경 ── */
#api-modal-bg{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── 모달 박스 ── */
#api-modal{
  background:#120d22;
  border:1px solid rgba(201,169,110,.3);
  border-radius:14px;
  padding:2rem 2rem 1.6rem;
  width:100%;max-width:420px;
  box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 40px rgba(201,169,110,.08);
  animation:slideUp .25s cubic-bezier(.2,.8,.3,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-title{
  font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.1em;
  color:var(--gold);text-align:center;margin-bottom:.8rem;
}
.modal-desc{font-size:.78rem;color:var(--muted);line-height:1.7;text-align:center;margin-bottom:1.2rem}
#api-key-input{
  width:100%;background:rgba(201,169,110,.07);
  border:1px solid rgba(201,169,110,.25);border-radius:7px;
  color:var(--text);font-family:'Lora',Georgia,serif;font-size:.9rem;
  padding:.75rem 1rem;outline:none;transition:border-color .3s;
  margin-bottom:.2rem;
}
#api-key-input:focus{border-color:rgba(201,169,110,.55)}
#api-key-input::placeholder{color:var(--faint)}
#api-status{
  font-size:.72rem;margin-top:.6rem;margin-bottom:.2rem;min-height:1.4em;
  text-align:center;font-style:italic;
}
#api-status.ok{color:#52b788}
#api-status.err{color:#e07a5f}
.modal-btns{display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.6rem;padding-top:1rem;border-top:1px solid rgba(201,169,110,.1)}
/* Drag ghost */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  width:68px;height:112px;border-radius:7px;opacity:.88;
  transform:translate(-50%,-50%) rotate(6deg) scale(1.05);
  box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 20px rgba(201,169,110,.25);
  display:none;
}
#drag-ghost svg{width:100%;height:100%;border-radius:7px}
</style>
</head>
<body>
<div id="app">

<!-- ── API Key 모달 ── -->
<div id="api-modal-bg" onclick="closeApiModal(event)" style="display:none">
  <div id="api-modal">
    <div class="modal-title">✦ API Key 설정</div>
    <p class="modal-desc">Anthropic API Key를 입력하면 Claude AI가 직접 타로를 해석합니다.<br>미입력 시 내장 해석 로직이 사용됩니다.</p>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off"/>
    <div id="api-status"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeApiModal()">취소</button>
      <button class="btn btn-p" onclick="saveApiKey()">✦ 저장</button>
    </div>
  </div>
</div>

<!-- API Key 버튼 — Worker로 이전 후 불필요
<button id="api-btn" onclick="openApiModal()" title="API Key 설정">
  <span id="api-dot"></span>
  API Key
</button>
-->

<div class="hdr">
  <p class="hdr-eye">✦ Tarot Signal ✦</p>
  <div class="divider"></div>
  <h1>타로 시그널</h1>
  <p>세 장의 카드가 당신의 길을 안내할 거예요.</p>
</div>

<div class="panel">
  <div class="lbl">✦ 질문 또는 고민</div>
  <textarea id="question" placeholder="궁금한 것, 고민하는 것을 자유롭게 적어주세요..."></textarea>
</div>

<div class="ctrl">
  <button class="btn btn-p" id="shuffle-btn" onclick="doShuffle()">✦ 카드 섞기</button>
  <button class="btn" id="read-btn" onclick="doReading()" disabled>✦ 결과 보기</button>
</div>

<!-- Deck scroll -->
<div class="spread-label">— 세 장의 카드를 아래 칸으로 옮겨주세요 —</div>
<div id="deck-fan">
  <div id="deck-scroll-wrap">
    <div id="deck-row"></div>
  </div>
</div>

<!-- Drop slots -->
<div class="slots-area">
  <div class="slots-row">
    <div class="slot-wrap">
      <div class="slot-label">과 거</div>
      <div class="drop-slot" id="slot-0" data-slot="0">
        <div class="slot-hint">카드를<br>여기로</div>
      </div>
    </div>
    <div class="slot-wrap">
      <div class="slot-label">현 재</div>
      <div class="drop-slot" id="slot-1" data-slot="1">
        <div class="slot-hint">카드를<br>여기로</div>
      </div>
    </div>
    <div class="slot-wrap">
      <div class="slot-label">미 래</div>
      <div class="drop-slot" id="slot-2" data-slot="2">
        <div class="slot-hint">카드를<br>여기로</div>
      </div>
    </div>
  </div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost"></div>

<!-- Result Modal -->
<div id="result-modal-bg" onclick="closeResultModal(event)">
  <div id="result-modal">
    <button id="result-close-btn" onclick="closeResultModal()">✕</button>
    <div id="result-box">
      <div class="result-title">✦ 타로 리딩 ✦</div>      <div class="result-datetime" id="result-datetime"></div>
      <div class="result-question" id="result-question"></div>
      <div class="result-cards-row" id="result-cards-row"></div>
      <div id="result-content"></div>
    </div>
    <div class="save-wrap">
      <button class="btn" onclick="doSave()">✦ 이미지로 저장</button>
      <button class="btn btn-reset" onclick="doReset()">↺ 다시 보기</button>
    </div>
  </div>
</div>

</div><!-- /app -->

<script>
// ══════════════════════════════════════════════════
// 타로 덱 데이터
// ══════════════════════════════════════════════════
// ── 수트별 색상 팔레트 ──
// Wands(불): 주황/붉은 계열 | Cups(물): 파란 계열 | Swords(공기): 회청 계열 | Pentacles(땅): 녹갈 계열
const SUIT = {
  wands:     {color:"#7b2d00", accent:"#f4a261", bg:"#1a0800", symbol:"🔥", suit:"완드"},
  cups:      {color:"#023e8a", accent:"#74c0fc", bg:"#03045e", symbol:"🌊", suit:"컵"},
  swords:    {color:"#1c3144", accent:"#a8dadc", bg:"#0a1520", symbol:"💨", suit:"소드"},
  pentacles: {color:"#2d5016", accent:"#95d44a", bg:"#0d1a06", symbol:"🌿", suit:"펜타클"},
};
const NUMS = ["에이스","2","3","4","5","6","7","8","9","10","페이지","나이트","퀸","킹"];
const NUMS_EN = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];

function minorCards(suitKey, startId) {
  const s = SUIT[suitKey];
  return NUMS.map((kr, i) => ({
    id: startId + i,
    name: `${NUMS_EN[i]} of ${suitKey.charAt(0).toUpperCase()+suitKey.slice(1)}`,
    kr: `${kr} of ${s.suit}`,
    num: NUMS_EN[i][0] === 'A' ? 'A' : String(i+1 > 10 ? ['P','Kn','Q','K'][i-10] : i+1),
    color: s.color, accent: s.accent, bg: s.bg, symbol: s.symbol,
    suit: suitKey,
  }));
}

function getMeaning(card) {
  if (card.id <= 21) return MAJOR_M[card.id];
  // 마이너: suit + 숫자 인덱스(0=에이스…13=킹)
  const suitMap = {wands:22, cups:36, swords:50, pentacles:64};
  const idx = card.id - suitMap[card.suit]; // 0–13
  return MINOR_M[card.suit][idx];
}

function makeCardSVG(card, w=68, h=112, reversed=false) {
  const r = 7;
  const cx = w/2, cy = h/2;
  const rotate = reversed ? `transform="rotate(180,${cx},${cy})"` : "";

  // 이모지 결정
  let emoji;
  if (card.id <= 21) {
    emoji = MAJOR_EMOJI[card.id];
  } else {
    const suitMap = {wands:22, cups:36, swords:50, pentacles:64};
    const idx = card.id - suitMap[card.suit]; // 0~13
    emoji = MINOR_EMOJI[card.suit][idx];
  }

  // 카드 표시명 (수트 카드는 "킹 of 완드" → "킹" + 하단 수트명)
  const topName = card.kr.includes(' of ') ? card.kr.split(' of ')[0] : card.kr;
  const suitLabel = card.suit
    ? `<text x="${cx}" y="${h*0.84}" text-anchor="middle" font-family="Georgia,serif" font-size="${w*0.095}" fill="${card.accent}" opacity="0.6">${SUIT[card.suit].suit}</text>`
    : '';

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g${card.id}w${w}" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="${card.color}" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="${card.bg}"/>
    </radialGradient>
    <clipPath id="cp${card.id}w${w}"><rect width="${w}" height="${h}" rx="${r}"/></clipPath>
  </defs>
  <g clip-path="url(#cp${card.id}w${w})" ${rotate}>
    <rect width="${w}" height="${h}" fill="${card.bg}"/>
    <rect width="${w}" height="${h}" fill="url(#g${card.id}w${w})"/>
    <rect x="4" y="4" width="${w-8}" height="${h-8}" rx="${r-2}" fill="none" stroke="${card.accent}" stroke-width="0.7" opacity="0.45"/>
    <rect x="6" y="6" width="${w-12}" height="${h-12}" rx="${r-3}" fill="none" stroke="${card.accent}" stroke-width="0.35" opacity="0.25"/>
    <text x="${cx}" y="${h*0.2}" text-anchor="middle" font-family="Georgia,serif" font-size="${w*0.16}" fill="${card.accent}" opacity="0.9">${card.num}</text>
    <text x="${cx}" y="${h*0.57}" text-anchor="middle" font-size="${w*0.32}" dominant-baseline="middle">${emoji}</text>
    <text x="${cx}" y="${h*0.72}" text-anchor="middle" font-family="Georgia,serif" font-size="${w*0.105}" fill="${card.accent}" opacity="0.8">${topName}</text>
    ${suitLabel}
  </g>
</svg>`;
}

function makeBackSVG(w=68, h=112) {
  const r=7, cx=w/2, cy=h/2;
  const lines = [];
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const x1=cx+Math.cos(a)*8, y1=cy+Math.sin(a)*8;
    const x2=cx+Math.cos(a)*(w*0.36), y2=cy+Math.sin(a)*(w*0.36);
    lines.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(201,169,110,0.2)" stroke-width="0.5"/>`);
  }
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <defs><clipPath id="cpb"><rect width="${w}" height="${h}" rx="${r}"/></clipPath></defs>
  <g clip-path="url(#cpb)">
    <rect width="${w}" height="${h}" fill="#1a1130"/>
    <rect x="4" y="4" width="${w-8}" height="${h-8}" rx="${r-2}" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="0.6"/>
    ${lines.join('')}
    <circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="rgba(201,169,110,0.35)" stroke-width="0.7"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="serif" font-size="8" fill="rgba(201,169,110,0.3)">✦</text>
  </g>
</svg>`;
}

// ══════════════════════════════════════════════════
// Drag and Drop — iOS Safari 완전 호환
// ══════════════════════════════════════════════════
const ghost = document.getElementById('drag-ghost');
let dragCard = null;
let dragStarted = false;
let touchStartX = 0, touchStartY = 0;
let scrollLocked = false;   // 스크롤 잠금 여부
const DRAG_THRESHOLD = 8;

function attachDrag(el, card) {
  // ── Mouse ──
  el.addEventListener('mousedown', e => {
    if(el.classList.contains('used') || !shuffled) return;
    e.preventDefault();
    beginDrag(card, e.clientX, e.clientY);
  });

  // ── Touch: passive:false 로 등록 → touchstart에서 preventDefault 가능 ──
  el.addEventListener('touchstart', e => {
    if(el.classList.contains('used') || !shuffled) return;
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    dragCard = card;
    dragStarted = false;
    scrollLocked = false;
    // passive:false지만 여기선 preventDefault 안 함 → 가로 스크롤 우선 허용
  }, {passive: false});
}

function beginDrag(card, cx, cy) {
  dragCard = card;
  dragStarted = true;
  scrollLocked = true;
  ghost.innerHTML = makeBackSVG(68, 112);
  ghost.style.display = 'block';
  moveGhost(cx, cy);
  const el = document.getElementById('mini-'+card.id);
  if(el) el.classList.add('dragging');
}

function moveGhost(cx, cy) {
  ghost.style.left = cx + 'px';
  ghost.style.top  = cy + 'px';
  highlightSlotAt(cx, cy);
}

function highlightSlotAt(cx, cy) {
  document.querySelectorAll('.drop-slot').forEach(s => {
    const r = s.getBoundingClientRect();
    s.classList.toggle('drag-over',
      cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom);
  });
}

function endDrag(cx, cy) {
  scrollLocked = false;
  if(!dragCard || !dragStarted) {
    dragCard = null; dragStarted = false;
    return;
  }
  ghost.style.display = 'none';
  document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
  const el = document.getElementById('mini-'+dragCard.id);
  if(el) el.classList.remove('dragging');

  let hit = null;
  document.querySelectorAll('.drop-slot').forEach(s => {
    const r = s.getBoundingClientRect();
    if(cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) hit = s;
  });
  if(hit) {
    const idx = parseInt(hit.dataset.slot);
    if(slots[idx] === null) placeCard(idx, dragCard);
  }
  dragCard = null;
  dragStarted = false;
}

// ── 전역 Mouse 이벤트 ──
document.addEventListener('mousemove', e => {
  if(dragCard && dragStarted) moveGhost(e.clientX, e.clientY);
});
document.addEventListener('mouseup', e => {
  if(dragCard) endDrag(e.clientX, e.clientY);
});

// ── 전역 Touch 이벤트 ──
document.addEventListener('touchmove', e => {
  if(!dragCard) return;
  const t = e.touches[0];
  const dx = Math.abs(t.clientX - touchStartX);
  const dy = Math.abs(t.clientY - touchStartY);

  if(!dragStarted) {
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < DRAG_THRESHOLD) return; // 아직 threshold 미만

    if(dx > dy * 1.5) {
      // 수평 스와이프 → 가로 스크롤로 처리, 드래그 취소
      dragCard = null;
      return;
    }
    // 수직/대각 스와이프 → 드래그 시작
    beginDrag(dragCard, t.clientX, t.clientY);
  }

  e.preventDefault();  // 드래그 중 스크롤 완전 차단
  moveGhost(t.clientX, t.clientY);
}, {passive: false});

document.addEventListener('touchend', e => {
  if(!dragCard) return;
  const t = e.changedTouches[0];
  endDrag(t.clientX, t.clientY);
});

document.addEventListener('touchcancel', () => {
  if(!dragCard) return;
  scrollLocked = false;
  ghost.style.display = 'none';
  document.querySelectorAll('.drop-slot').forEach(s => s.classList.remove('drag-over'));
  const el = document.getElementById('mini-'+dragCard.id);
  if(el) el.classList.remove('dragging');
  dragCard = null; dragStarted = false;
});

// ══════════════════════════════════════════════════
// Place / Remove card
// ══════════════════════════════════════════════════
function placeCard(slotIdx, card) {
  slots[slotIdx] = card;

  const slotEl = document.getElementById('slot-'+slotIdx);
  slotEl.classList.remove('drag-over');
  slotEl.classList.add('filled');

  const inner = document.createElement('div');
  inner.className = 'slot-inner' + (card.reversed ? ' reversed' : '');
  inner.innerHTML = makeCardSVG(card, 110, 185, card.reversed) +
    (card.reversed ? '<div class="rev-badge">역방향</div>' : '');

  const rmBtn = document.createElement('button');
  rmBtn.className = 'remove-btn';
  rmBtn.innerHTML = '✕';
  rmBtn.title = '카드 제거';
  rmBtn.onclick = () => removeCard(slotIdx, card);

  slotEl.innerHTML = '';
  slotEl.appendChild(inner);
  slotEl.appendChild(rmBtn);

  // mark mini card as used
  document.getElementById('mini-'+card.id).classList.add('used');

  checkAllSlots();
}

function clearSlot(slotIdx, restoreMini=true) {
  const old = slots[slotIdx];
  slots[slotIdx] = null;

  const slotEl = document.getElementById('slot-'+slotIdx);
  slotEl.classList.remove('filled','drag-over');
  slotEl.innerHTML = '<div class="slot-hint">카드를<br>여기로</div>';

  if(restoreMini && old) {
    const mini = document.getElementById('mini-'+old.id);
    if(mini) mini.classList.remove('used');
  }
  checkAllSlots();
}

function removeCard(slotIdx, card) {
  clearSlot(slotIdx, true);
}

function checkAllSlots() {
  const filled = slots.filter(s=>s!==null).length;
  document.getElementById('read-btn').disabled = (filled < 3);
  document.getElementById('shuffle-btn').disabled = (filled > 0);
}

async function doReading() {
  const question = document.getElementById('question').value.trim();
  const apiKey   = savedApiKey;
  const rw = document.getElementById('result-modal-bg');
  const rc = document.getElementById('result-content');

  openResultModal();
  rc.innerHTML = '<div class="loading">✦ 카드가 속삭이는 메시지를 읽고 있습니다...</div>';

  // ── 날짜/시간 (결과 보기 누른 시각) ──
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dtStr = `${now.getFullYear()}년 ${pad(now.getMonth()+1)}월 ${pad(now.getDate())}일 ${pad(now.getHours())}시 ${pad(now.getMinutes())}분`;
  document.getElementById('result-datetime').textContent = dtStr;

  // ── 질문 표시 ──
  document.getElementById('result-question').textContent = question ? `"${question}"` : '';

  // ── 카드 이미지 3장 ──
  const cardsRow = document.getElementById('result-cards-row');
  cardsRow.innerHTML = slots.map((c, i) => {
    const rev = c.reversed;
    const svgHTML = makeCardSVG(c, 90, 148, rev);
    return `
      <div class="result-card-item">
        <div class="rc-label">${POSITIONS[i]}</div>
        <div class="rc-svg-wrap${rev ? ' reversed' : ''}">
          <div class="rc-svg">${svgHTML}</div>
          ${rev ? '<div class="rc-rev-badge">역방향</div>' : ''}
        </div>
      </div>`;
  }).join('');

  // ── Worker API 호출 ──
  const WORKER_URL = 'https://tarot-signal-api.ydkoolab.workers.dev';

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        cards: slots.map(c => ({ kr: c.kr, name: c.name, reversed: c.reversed }))
      })
    });

    if(!res.ok) throw new Error(`서버 오류 ${res.status}`);

    const data = await res.json();
    if(data.error) throw new Error(data.error);
    if(!data.text) throw new Error('응답이 비어있습니다');

    rc.innerHTML = `<div class="result-text">${data.text}</div>`;
  } catch(e) {
    // Worker 실패 시 내장 로직으로 fallback
    rc.innerHTML = `<div class="result-text">${builtinReading(question)}</div>`;
  }
  // 모달이므로 scrollIntoView 불필요
}

뽑힌 카드:
${cardDesc}

  }

// 내장 해석 로직 — 카드 조합 기반 풍부한 해석
// ══════════════════════════════════════════════════
function builtinReading(q) {

    very_positive:`"${q}"에 대해 카드들이 매우 긍정적인 신호를 보내고 있습니다.`,
    positive:     `"${q}"에 대해 카드들이 좋은 흐름을 보여주고 있어요.`,
    neutral:      `"${q}"에 대해 카드들이 신중하게 접근하라고 말하고 있습니다.`,
    caution:      `"${q}"에 대해 카드들이 지금은 내면을 돌아볼 시간이 필요하다고 말합니다.`,
  });
  return `${o}\n\n${flowDesc}${sp}\n\n${advice}`;
}

// ══════════════════════════════════════════════════
// Reset
// ══════════════════════════════════════════════════
function doReset() {
  // 결과 모달 닫기
  document.getElementById('result-modal-bg').classList.remove('on');
  document.body.style.overflow = '';

  slots = [null,null,null];
  [0,1,2].forEach(i => clearSlot(i, false));
  document.getElementById('result-wrap').classList.remove('on');
  document.getElementById('question').value = '';
  deckOrder.forEach(card => {
    const mini = document.getElementById('mini-'+card.id);
    if(mini) mini.classList.remove('used');
  });
  document.getElementById('read-btn').disabled = true;
  document.getElementById('shuffle-btn').disabled = false;
  // 섞기 전 힌트 상태로 복원
  shuffled = false;
  deckOrder = [];
  drawHintFan();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ══════════════════════════════════════════════════
// Save image
// ══════════════════════════════════════════════════
async function doSave() {
  const btn = document.querySelector('.save-wrap .btn');
  const origText = btn ? btn.textContent : '';
  if(btn) { btn.textContent = '저장 중...'; btn.disabled = true; }

  try {
    if(typeof html2canvas === 'undefined') throw new Error('html2canvas 미로드');

    const source = document.getElementById('result-box');

    // 캡처용 래퍼 — 여백 + 배경 추가
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `
      position:fixed; left:-9999px; top:0;
      background:#0d0a1a;
      padding:32px 28px;
      width:${Math.min(source.offsetWidth + 56, 600)}px;
      box-sizing:border-box;
      border-radius:16px;
      font-family:'Lora',Georgia,serif;
    `;
    const clone = source.cloneNode(true);
    // 타이틀 가운데 정렬 강제
    const title = clone.querySelector('.result-title');
    if(title) title.style.cssText += ';text-align:center;width:100%;display:block;';
    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);

    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#0d0a1a',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });
    document.body.removeChild(wrapper);

    const dataUrl = canvas.toDataURL('image/png');
    const date = new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g, '-').replace(/-$/, '');
    const filename = `타로리딩_${date}.png`;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if(isIOS) {
      const w = window.open('', '_blank');
      if(w) {
        // 순수 img 태그만 — 텍스트 없이 이미지만 표시해야 길게 눌러 사진 저장 가능
        w.document.write(`<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0d0a1a;display:flex;align-items:flex-start;justify-content:center}
  img{width:100%;max-width:600px;display:block;-webkit-user-select:none;user-select:none}
  .tip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.4);
    color:#c9a96e;font-family:sans-serif;font-size:13px;
    padding:10px 18px;border-radius:20px;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>
<img src="${dataUrl}" alt="타로리딩" draggable="false"/>
<div class="tip">이미지를 길게 눌러 사진 저장</div>
</body></html>`);
        w.document.close();
      } else {
        showImageOverlay(dataUrl, filename);
      }
    } else {
      const a = document.createElement('a');
      a.download = filename;
      a.href = dataUrl;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  } catch(e) {
    alert('이미지 저장에 실패했습니다.\n' + e.message);
  } finally {
    if(btn) { btn.textContent = origText; btn.disabled = false; }
  }
}

// iOS 팝업 차단 시 오버레이로 이미지 보여주기
function showImageOverlay(dataUrl, filename) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;gap:14px;
  `;
  overlay.innerHTML = `
    <p style="color:#c9a96e;font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.1em;text-align:center">
      이미지를 길게 눌러 저장하세요
    </p>
    <img src="${dataUrl}" style="max-width:100%;max-height:75vh;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.8)"/>
    <button onclick="this.parentNode.remove()" style="
      font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;
      padding:.55rem 1.4rem;border-radius:30px;border:1px solid rgba(201,169,110,.5);
      background:transparent;color:#c9a96e;cursor:pointer;margin-top:4px;
    ">✕ 닫기</button>
  `;
  document.body.appendChild(overlay);
}

let savedApiKey = '';

function openApiModal() {
  document.getElementById('api-key-input').value = savedApiKey;
  updateApiStatus();
  document.getElementById('api-modal-bg').style.display = 'flex';
  setTimeout(() => document.getElementById('api-key-input').focus(), 100);
}

function closeApiModal(e) {
  // 배경 클릭 시 닫기 (모달 내부 클릭은 무시)
  if(e && e.target !== document.getElementById('api-modal-bg')) return;
  document.getElementById('api-modal-bg').style.display = 'none';
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  savedApiKey = val;
  const dot = document.getElementById('api-dot');
  const status = document.getElementById('api-status');
  if(val) {
    dot.classList.add('active');
    status.className = 'ok';
    status.textContent = '✓ API Key가 저장되었습니다';
    setTimeout(() => {
      document.getElementById('api-modal-bg').style.display = 'none';
    }, 800);
  } else {
    dot.classList.remove('active');
    status.className = '';
    status.textContent = '내장 해석 로직이 사용됩니다';
    setTimeout(() => {
      document.getElementById('api-modal-bg').style.display = 'none';
    }, 800);
  }
}

function updateApiStatus() {
  const status = document.getElementById('api-status');
  if(savedApiKey) {
    status.className = 'ok';
    status.textContent = '✓ API Key가 설정되어 있습니다';
  } else {
    status.className = '';
    status.textContent = '미설정 — 내장 해석 로직 사용 중';
  }
}

function openResultModal() {
  document.getElementById('result-modal-bg').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeResultModal(e) {
  if(e && e.target !== document.getElementById('result-modal-bg')) return;
  document.getElementById('result-modal-bg').classList.remove('on');
  document.body.style.overflow = '';
}

// ESC 키로 결과 모달 닫기
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') {
    document.getElementById('api-modal-bg').style.display = 'none';
    document.getElementById('result-modal-bg').classList.remove('on');
    document.body.style.overflow = '';
  }
});
// ══════════════════════════════════════════════════
// Shuffle
// ══════════════════════════════════════════════════
function doShuffle() {
  slots = [null, null, null];
  [0, 1, 2].forEach(i => clearSlot(i, false));

  let arr = [...DECK];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  deckOrder = arr.map(c => ({ ...c, reversed: Math.random() < 0.35 }));
  shuffled = true;

  renderDeck();
  document.getElementById('result-modal-bg').classList.remove('on');
  document.body.style.overflow = '';
  document.getElementById('read-btn').disabled = true;
  document.getElementById('shuffle-btn').disabled = false;
}

function renderDeck() {
  const row = document.getElementById('deck-row');
  row.innerHTML = '';

  const CW = 72, CH = 118;
  const OVERLAP = 36; // 겹침 px (margin-right: -OVERLAP)

  deckOrder.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'mini-card';
    div.id = 'mini-' + card.id;
    div.dataset.id = card.id;

    // 카드마다 약간 랜덤 기울기
    const rot = (Math.random() * 4 - 2).toFixed(2);
    div.style.transform = `rotate(${rot}deg)`;
    div.style.marginRight = `-${OVERLAP}px`;
    div.style.zIndex = i;

    div.innerHTML = makeBackSVG(CW, CH);
    attachDrag(div, card);
    row.appendChild(div);
  });

  // 마지막 카드 margin 제거
  const last = row.lastElementChild;
  if(last) last.style.marginRight = '0';

  // 스크롤 중앙으로
  const wrap = document.getElementById('deck-scroll-wrap');
  setTimeout(() => {
    wrap.scrollLeft = (wrap.scrollWidth - wrap.clientWidth) / 2;
  }, 50);
}

// 힌트용 더미 카드 (섞기 전)
function drawHintFan() {
  const row = document.getElementById('deck-row');
  row.innerHTML = '';

  const N = 78; // 실제 덱과 동일한 수
  const CW = 72, CH = 118, OVERLAP = 36;

  for(let i = 0; i < N; i++){
    const div = document.createElement('div');
    div.className = 'mini-card hint';
    const rot = (Math.random() * 3 - 1.5).toFixed(2);
    div.style.transform = `rotate(${rot}deg)`;
    div.style.marginRight = `-${OVERLAP}px`;
    div.style.zIndex = i;
    div.innerHTML = makeBackSVG(CW, CH);
    row.appendChild(div);
  }
  const last = row.lastElementChild;
  if(last) last.style.marginRight = '0';

  // 중앙 스크롤
  const wrap = document.getElementById('deck-scroll-wrap');
  setTimeout(() => {
    wrap.scrollLeft = (wrap.scrollWidth - wrap.clientWidth) / 2;
  }, 50);
}

// 스크롤 영역 마우스 드래그 (빈 공간 클릭-드래그로 좌우 스크롤)
(function initScrollDrag(){
  const wrap = document.getElementById('deck-scroll-wrap');
  let isScrollDragging = false, startX = 0, scrollLeft = 0;

  wrap.addEventListener('mousedown', e => {
    if(e.target.closest('.mini-card')) return; // 카드 위는 카드 드래그로
    isScrollDragging = true;
    startX = e.pageX - wrap.offsetLeft;
    scrollLeft = wrap.scrollLeft;
  });
  window.addEventListener('mouseup', () => { isScrollDragging = false; });
  wrap.addEventListener('mousemove', e => {
    if(!isScrollDragging) return;
    e.preventDefault();
    wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX);
  });
})();

drawHintFan();
</script>
